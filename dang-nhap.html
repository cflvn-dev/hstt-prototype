<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập | Thanh toán điện GENCO3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/design-system.css">
<link rel="stylesheet" href="assets/themes.css">
<link rel="stylesheet" href="assets/app.css">
<script src="assets/theme-init.js"></script>
<style>
  /* Bố cục riêng cho màn đăng nhập - màn độc lập, không dùng app shell (SC-009) */
  .login-wrap { min-height: 100vh; display: grid; place-items: center;
    background: var(--c-bg); padding: 24px; }
  .login-card { width: 100%; max-width: 380px; }
  .login-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .login-brand .sidebar__logo { width: 40px; height: 40px; }
  .login-brand b { font-size: var(--fs-lg); color: var(--c-ink-900); display: block; }
  .login-brand span { font-size: var(--fs-sm); color: var(--c-ink-500); }
  .login-title { font-size: var(--fs-xl); font-weight: var(--fw-bold); color: var(--c-ink-900); margin: 0 0 4px; }
  .login-sub { font-size: var(--fs-sm); color: var(--c-ink-500); margin: 0 0 20px; }
  .login-foot { text-align: center; margin-top: 18px; font-size: var(--fs-xs); color: var(--c-ink-400); }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <div class="sidebar__logo">G3</div>
      <div><b>Thanh toán điện</b><span>GENCO3 · v1.0</span></div>
    </div>

    <div class="card">
      <div class="card__body">
        <h1 class="login-title">Đăng nhập</h1>
        <p class="login-sub">Hệ thống chỉ dành cho người dùng có tài khoản.</p>

        <!-- Băng lỗi: ẩn mặc định, hiện khi xác thực thất bại (FL-010 A1) -->
        <div id="loginError" class="alert alert--danger" style="display:none; margin-bottom:16px;">
          <span>Tên đăng nhập hoặc mật khẩu không đúng.</span>
        </div>

        <form onsubmit="return doLogin(event)">
          <div class="field">
            <label class="label" for="username">Tên đăng nhập / Email</label>
            <input class="input" id="username" type="text" autocomplete="username"
                   placeholder="vd: duytk@genco3.vn" required>
          </div>
          <div class="field">
            <label class="label" for="password">Mật khẩu</label>
            <input class="input" id="password" type="password" autocomplete="current-password"
                   placeholder="Nhập mật khẩu" required>
          </div>
          <button class="btn btn-primary btn-lg" type="submit" style="width:100%;">Đăng nhập</button>
        </form>
      </div>
    </div>

    <div class="login-foot">Prototype - dữ liệu mẫu. Nhập bất kỳ để vào; để trống 1 ô sẽ báo lỗi.</div>
  </div>
</div>

<script>
  // Prototype: mô phỏng hành vi đăng nhập của SC-009 / FL-010.
  // KHÔNG xác thực thật - chỉ minh họa: có nhập => vào Trang chào (SC-021); thiếu => hiện băng lỗi chung.
  function doLogin(e) {
    e.preventDefault();
    var u = document.getElementById('username').value.trim();
    var p = document.getElementById('password').value.trim();
    var err = document.getElementById('loginError');
    if (!u || !p) { err.style.display = 'flex'; return false; }
    err.style.display = 'none';
    window.location.href = 'index.html';   // vào Trang chào - màn mặc định sau đăng nhập (SC-021, DEC-021)
    return false;
  }
</script>
</body>
</html>
